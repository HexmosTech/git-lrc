name: osv-scanner

on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - main
      - master
    paths:
      - go.mod
      - go.sum
      - .github/workflows/osv-scanner.yml

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install OSV-Scanner
        run: |
          curl -L -o osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Run OSV-Scanner
        run: |
          mkdir -p security_issues
          osv-scanner --format json . > security_issues/osv-scanner-ci.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osv-scanner-ci-report
          path: security_issues/osv-scanner-ci.json

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>git-lrc Manager | Home</title>
  <!-- Theme bootstrap: set data-theme before first paint (no flash).
       Stored choice wins; otherwise follow the OS preference. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('lrc-theme');
        if (t !== 'light' && t !== 'dark') {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <!-- Safe: integrity is for externally fetched subresources; this favicon is an inline data URI. -->
  <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230078d4' stroke-width='2'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Ccircle cx='12' cy='12' r='4' fill='%230078d4'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    /* ════════════════════════════════════════════════════════════════
       git-lrc Manager — connectors dashboard styles.
       The color palette, surfaces, shadows and gradients all come from the
       global token system in styles.css (:root = dark, [data-theme=light]
       = light), so this whole dashboard themes with the toggle. Only the
       connectors-specific profile-chip tints are defined per-theme here.
       ════════════════════════════════════════════════════════════════ */
    :root[data-theme="dark"] {
      --profile-chip-grad-a: rgba(0,120,212,0.12);
      --profile-chip-grad-b: rgba(0,120,212,0.03);
      --profile-chip-hover-grad-a: rgba(0,120,212,0.2);
      --profile-chip-hover-grad-b: rgba(0,120,212,0.06);
      --profile-avatar-fallback-bg: rgba(0,120,212,0.15);
      --profile-avatar-fallback-border: rgba(0,120,212,0.55);
      --profile-hero-avatar-fallback-bg: rgba(0,120,212,0.15);
      --profile-hero-avatar-fallback-border: rgba(0,120,212,0.5);
    }
    :root[data-theme="light"] {
      --profile-chip-grad-a: rgba(10,111,209,0.07);
      --profile-chip-grad-b: rgba(10,111,209,0.02);
      --profile-chip-hover-grad-a: rgba(10,111,209,0.12);
      --profile-chip-hover-grad-b: rgba(10,111,209,0.04);
      --profile-avatar-fallback-bg: rgba(10,111,209,0.10);
      --profile-avatar-fallback-border: rgba(10,111,209,0.30);
      --profile-hero-avatar-fallback-bg: rgba(10,111,209,0.10);
      --profile-hero-avatar-fallback-border: rgba(10,111,209,0.30);
    }

    body {
      overflow: auto;
      background: var(--ambient);
      background-attachment: fixed;
      color: var(--text-secondary);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #app { display: block; height: auto; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: var(--space-lg); }
    .ui-shell { display: flex; flex-direction: column; gap: 14px; }

    /* Inline-SVG icon base (see ui-connectors/components/Icons.js) */
    .lrc-icon {
      display: inline-block;
      vertical-align: -0.18em;
      flex: 0 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface-glass);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md), var(--ring-inset-top);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .logo-wrap {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(0, 120, 212, 0.45);
      background: linear-gradient(150deg, rgba(0,120,212,0.28), rgba(0,120,212,0.04));
      box-shadow: var(--shadow-accent), var(--ring-inset-top);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 40px;
      transition: transform var(--motion-base) var(--motion-ease-soft),
                  box-shadow var(--motion-base) var(--motion-ease-soft);
    }
    .logo-wrap:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-accent-strong), var(--ring-inset-top);
    }
    .logo-wrap img {
      width: 24px;
      height: 24px;
      display: block;
    }
    .brand-text {
      min-width: 0;
    }
    .brand-text .meta {
      color: var(--text-muted);
      font-size: 13px;
    }
    .header-right {
      margin-left: auto;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .header-auth-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-right-stack {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .org-context-switcher {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .org-context-label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      white-space: nowrap;
    }
    .org-context-select {
      margin: 0;
      min-width: 180px;
      max-width: 260px;
      padding: 7px 9px;
      border-radius: 6px;
      border: 1px solid var(--border-medium);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 12px;
    }
    .org-context-select:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      line-height: 1.15;
      background: var(--title-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub { color: var(--text-muted); margin-bottom: 18px; }
    .ui-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface-glass);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm), var(--ring-inset-top);
      position: sticky;
      top: 8px;
      z-index: 5;
    }
    .ui-nav .nav-label {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-right: 4px;
    }
    .ui-nav .nav-link {
      text-decoration: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color var(--motion-fast) ease,
                  background var(--motion-fast) ease,
                  border-color var(--motion-fast) ease;
    }
    .ui-nav .nav-link.active {
      border-color: rgba(0, 120, 212, 0.55);
      color: #fff;
      background: var(--accent-gradient);
      box-shadow: var(--shadow-accent);
    }
    .ui-nav .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
    .ui-nav .nav-link.active:hover { background: var(--accent-gradient-hover); color: #fff; }
    .ui-nav .nav-link:focus-visible,
    a:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .session-pill {
      margin-left: auto;
      font-size: 12px;
      border-radius: 999px;
      padding: 5px 10px;
      border: 1px solid var(--border-medium);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .session-pill.session-ok {
      border-color: var(--status-success-border);
      background: var(--status-success-bg);
      color: var(--status-success-text);
    }
    .session-pill.session-bad {
      border-color: var(--status-error-border);
      background: var(--status-error-bg);
      color: var(--status-error-text);
    }
    .session-banner {
      display: grid;
      gap: 10px;
    }
    .profile-chip {
      min-width: 180px;
      max-width: 320px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      text-decoration: none;
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      padding: 4px 8px;
      background: linear-gradient(135deg, var(--profile-chip-grad-a), var(--profile-chip-grad-b));
    }
    .profile-chip:hover {
      border-color: var(--accent-blue);
      background: linear-gradient(135deg, var(--profile-chip-hover-grad-a), var(--profile-chip-hover-grad-b));
    }
    .profile-chip-avatar {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--border-medium);
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .profile-chip-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent-blue-light);
      background: var(--profile-avatar-fallback-bg);
      border-color: var(--profile-avatar-fallback-border);
    }
    .profile-chip-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .profile-chip-name {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-chip-meta,
    .profile-chip-org {
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-hero {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
    }
    .profile-avatar-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--border-medium);
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .profile-avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-blue-light);
      background: var(--profile-hero-avatar-fallback-bg);
      border-color: var(--profile-hero-avatar-fallback-border);
    }
    .profile-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .profile-title {
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-sub {
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }
    .profile-item {
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      background: var(--bg-tertiary);
      padding: 10px;
      min-width: 0;
    }
    .profile-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.35px;
      margin-bottom: 4px;
    }
    .profile-value {
      font-size: 13px;
      color: var(--text-primary);
      word-break: break-word;
    }
    @media (max-width: 900px) {
      .ui-nav {
        flex-wrap: wrap;
      }
      .profile-chip {
        width: 100%;
        max-width: none;
      }
      .header {
        flex-wrap: wrap;
      }
      .header-right {
        width: 100%;
        justify-content: flex-start;
      }
      .header-right-stack {
        justify-content: flex-start;
        width: 100%;
      }
      .org-context-switcher {
        width: 100%;
      }
      .org-context-select {
        min-width: 0;
        width: 100%;
        max-width: none;
      }
      .header-auth-actions {
        width: 100%;
      }
      .profile-hero {
        grid-template-columns: 1fr;
        justify-items: start;
      }
      .profile-actions {
        width: 100%;
      }
    }
    .breadcrumbs {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 2px 2px 4px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .crumb-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .crumb-link {
      color: var(--text-muted);
      text-decoration: none;
    }
    .crumb-link:hover {
      color: var(--accent-blue-light);
      text-decoration: underline;
    }
    .crumb-current {
      color: var(--text-secondary);
      font-weight: 500;
    }
    .crumb-sep {
      color: var(--text-muted);
      opacity: 0.75;
    }
    .grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    .single { display: grid; gap: 16px; grid-template-columns: 1fr; }
    .card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md), var(--ring-inset-top);
    }
    .card h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text-primary);
    }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    input, select {
      width: 100%;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 10px;
      transition: border-color var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.22);
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid rgba(0, 120, 212, 0.55);
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      cursor: pointer;
      box-shadow: var(--shadow-sm), var(--ring-inset-top);
      transition: transform var(--motion-fast) var(--motion-ease-soft),
                  box-shadow var(--motion-base) var(--motion-ease-soft),
                  background var(--motion-fast) ease,
                  border-color var(--motion-fast) ease,
                  filter var(--motion-fast) ease;
    }
    button:hover { background: var(--accent-gradient-hover); transform: translateY(-1px); box-shadow: var(--shadow-accent), var(--ring-inset-top); }
    button:active { transform: translateY(0) scale(0.98); box-shadow: var(--shadow-xs); }
    button:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    button.secondary {
      background: var(--surface-raised);
      border-color: var(--border-medium);
      color: var(--text-secondary);
      box-shadow: var(--shadow-xs), var(--ring-inset-top);
    }
    button.secondary:hover { background: var(--bg-active); border-color: var(--text-dim); color: var(--text-primary); box-shadow: var(--shadow-sm), var(--ring-inset-top); }
    button.danger { background: var(--danger-gradient); border-color: rgba(241, 76, 76, 0.6); }
    button.danger:hover { filter: brightness(1.08); box-shadow: 0 6px 18px rgba(241, 76, 76, 0.4), var(--ring-inset-top); }
    button.tertiary-danger {
      background: transparent;
      border-color: var(--status-error-border);
      color: var(--status-error-text);
      box-shadow: none;
    }
    button.tertiary-danger:hover { background: var(--status-error-bg); border-color: var(--accent-red); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(241, 76, 76, 0.28); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; filter: saturate(0.7); }
    button:disabled:hover { transform: none; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .connector-name-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .connector-name-row input {
      margin-bottom: 0;
      min-width: 0;
    }
    .subtle-action {
      font-size: 12px;
      padding: 8px 10px;
      white-space: nowrap;
      opacity: 0.92;
    }
    .status { margin-top: 8px; font-size: 13px; }
    .status.ok { color: var(--status-success-text); }
    .status.err { color: var(--status-error-text); }
    .connectors-content {
      width: min(100%, 900px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .connectors-toolbar {
      width: 100%;
      margin-bottom: 2px;
    }
    .form-content {
      width: min(100%, 900px);
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .item {
      position: relative;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      background: var(--surface-raised);
      width: 100%;
      box-shadow: var(--shadow-xs), var(--ring-inset-top);
      transition: transform var(--motion-base) var(--motion-ease-soft),
                  box-shadow var(--motion-base) var(--motion-ease-soft),
                  border-color var(--motion-fast) ease;
      animation: item-enter var(--motion-slow) var(--motion-ease-soft) both;
    }
    /* Accent rail that fades in on hover */
    .item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      border-radius: var(--radius-pill);
      background: var(--accent-gradient);
      opacity: 0;
      transform: scaleY(0.4);
      transform-origin: center;
      transition: opacity var(--motion-base) ease, transform var(--motion-base) var(--motion-ease-soft);
    }
    .item:hover {
      transform: translateY(-2px);
      border-color: var(--border-medium);
      box-shadow: var(--shadow-md), var(--ring-inset-top);
    }
    .item:hover::before { opacity: 1; transform: scaleY(1); }
    .item.dragging {
      opacity: 0.6;
      box-shadow: var(--shadow-lg);
      transform: scale(1.01);
    }
    .item.drag-over {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-accent), inset 0 0 0 1px var(--accent-blue);
    }
    @keyframes item-enter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-attention {
      animation: pulse-attention 0.6s var(--motion-ease-soft) 2;
    }
    @keyframes pulse-attention {
      0%, 100% { box-shadow: var(--shadow-xs), var(--ring-inset-top); }
      50% { box-shadow: var(--shadow-accent-strong), inset 0 0 0 1px var(--accent-blue); }
    }
    .connector-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px 14px;
      margin-bottom: 4px;
    }
    .connector-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    /* Provider identity avatar — brand-tinted initial */
    .provider-avatar {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border-radius: var(--radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      background: linear-gradient(150deg,
        color-mix(in srgb, var(--provider-color) 92%, white 8%),
        var(--provider-color));
      box-shadow: 0 2px 6px color-mix(in srgb, var(--provider-color) 38%, transparent),
                  inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    .connector-id-block {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }
    .connector-tags {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .connector-tags .badge { margin-left: 0; }
    .badge-provider { text-transform: capitalize; }
    .connector-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: end;
      white-space: nowrap;
    }
    .item-title { font-weight: 700; font-size: 14px; color: var(--text-primary); letter-spacing: -0.1px; }
    .badge {
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-pill);
      padding: 3px 9px;
      color: var(--text-muted);
      margin-left: 8px;
      background: var(--bg-tertiary);
      transition: border-color var(--motion-fast) ease, color var(--motion-fast) ease;
    }
    .badge-id {
      margin-left: 0;
      color: var(--accent-blue-light);
      border-color: rgba(10, 111, 209, 0.30);
      background: rgba(10, 111, 209, 0.08);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .muted { color: var(--text-muted); font-size: 12px; }
    .muted-meta {
